<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NVD Vault</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>NVD Vault</h1>

        <div class="tabs">
            <button class="tab active" data-tab="scan">Быстрое сканирование</button>
            <button class="tab" data-tab="vault">Сборка Vault</button>
            <button class="tab" data-tab="browse">Просмотр Vault</button>
        </div>

        <section id="tab-scan" class="tab-content active">
            <div class="form">
                <label>Продукт: <input type="text" id="product" value="kibana"></label>
                <label>Версия: <input type="text" id="version" value="8.19.9"></label>
                <label>Vendor: <input type="text" id="vendor" value="elastic"></label>
                <button id="scan-btn">Сканировать</button>
            </div>
            <div id="scan-status"></div>
            <div id="scan-results"></div>
        </section>

        <section id="tab-vault" class="tab-content">
            <div class="form">
                <label>
                    Inventory.json:
                    <div class="file-row">
                        <input type="text" id="inventory-path" readonly placeholder="не выбран">
                        <button id="pick-inventory">Выбрать...</button>
                    </div>
                </label>
                <label>
                    Папка для vault:
                    <div class="file-row">
                        <input type="text" id="vault-path" readonly placeholder="не выбрана">
                        <button id="pick-vault">Выбрать...</button>
                    </div>
                </label>
                <button id="build-btn" disabled>Собрать Vault</button>
            </div>
            <div id="build-log"></div>
        </section>

        <section id="tab-browse" class="tab-content">
            <div class="vault-toolbar">
                <button id="open-vault-btn">Открыть Vault...</button>
                <button id="export-btn" disabled>Экспорт в ZIP</button>
                <span id="vault-meta"></span>
            </div>

            <div class="vault-browser" id="vault-browser" style="display:none;">
                <aside class="sidebar">
                    <input type="text" id="filter-input" placeholder="Фильтр...">
                    <div class="note-group">
                        <h3>Продукты</h3>
                        <ul id="list-products"></ul>
                    </div>
                    <div class="note-group">
                        <h3>CVE</h3>
                        <ul id="list-cves"></ul>
                    </div>
                    <div class="note-group">
                        <h3>CWE</h3>
                        <ul id="list-cwes"></ul>
                    </div>
                </aside>
                <main class="note-view">
                    <div id="note-content" class="markdown-body">
                        <p class="hint">Выбери заметку слева.</p>
                    </div>
                </main>
            </div>
        </section>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
